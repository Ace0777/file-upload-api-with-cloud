name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build JAR
        run: |
          cd api
          ./gradlew bootJar

      - name: Deploy para EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          scp -o StrictHostKeyChecking=no -i key.pem api/build/libs/api-0.0.1-SNAPSHOT.jar ec2-user@$HOST:~/app.jar
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$HOST "pkill -f 'java -jar' || true && sleep 2 && export DB_PASSWORD=$DB_PASSWORD && nohup java -jar ~/app.jar > ~/app.log 2>&1 &"
          rm key.pem