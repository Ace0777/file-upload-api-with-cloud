name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build JAR
        run: |
          cd api
          chmod +x gradlew
          ./gradlew bootJar

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          scp -o StrictHostKeyChecking=no -i key.pem api/build/libs/api-0.0.1-SNAPSHOT.jar ec2-user@$HOST:~/app.jar
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$HOST "sudo systemctl restart api"
          rm key.pem